<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>

    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap"
      rel="stylesheet"
    />

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: #f5efe6;
        color: #2b2b2b;
        overflow-x: hidden;
      }

      /* ===== HEADER ===== */

      .header {
        width: 95%;
        margin: 60px auto 80px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .profile {
        display: flex;
        align-items: center;
        gap: 40px;
      }

      .avatar {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        border: 3px solid #3e2f25;
        overflow: visible;
        position: relative;
        background: #fffaf4;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .avatar img.decor {
        position: absolute;
        top: -8%;
        left: 50%;
        transform: translateX(-50%);
        width: 220px;
        pointer-events: none;
      }

      .avatar img.main {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        object-fit: cover;
        display: block;
        border: 2px solid rgba(62, 47, 37, 0.5);
        background: #fffaf4;
      }

      .info h1 {
        font-size: 40px;
      }

      .info p {
        margin-top: 10px;
        color: #6a5c50;
      }

      .contact-btn {
        padding: 12px 50px;
        border-radius: 30px;
        border: 2px solid #3e2f25;
        background: #fffaf4;
        font-weight: 600;
        cursor: pointer;
        transition: 0.3s ease;
      }

      .contact-btn:hover {
        background: #3e2f25;
        color: white;
      }

      /* ===== SECTION ===== */

      .section {
        width: 95%;
        margin: 0 auto 100px;
      }

      .section h2 {
        margin-bottom: 40px;
        font-size: 22px;
        letter-spacing: 1px;
      }

      /* ===== GRID ===== */

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 18px;
        justify-items: stretch;
      }

      /* Right-aligned horizontal layout with wrapping for specific sections */
      .grid.grid--fixed,
      .grid.grid--spotify {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end; /* sát lề phải */
        gap: 18px;
        align-items: flex-start;
      }

      /* Responsive: on medium screens show two cards per row, on small screens full width */
      @media (max-width: 900px) {
        .card {
          width: calc(50% - 9px);
        }
      }

      @media (max-width: 480px) {
        .card {
          width: 100%;
        }
        /* center on very small screens for better appearance */
        .grid.grid--fixed,
        .grid.grid--spotify {
          justify-content: center;
          padding: 0 10px;
        }
      }

      .card {
        background: #fffaf4;
        border: 2px solid #3e2f25;
        border-radius: 18px;
        overflow: hidden;
        transform: translateY(80px);
        opacity: 0;
        transition: 0.6s ease;
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        width: 320px; /* fixed card width */
      }

      .card.show {
        transform: translateY(0);
        opacity: 1;
      }

      .card img {
        height: 120px;
        width: auto;
        max-width: 100%;
        object-fit: contain;
        object-position: center;
        display: block;
        margin: 0 auto;
        background: #fffaf4;
      }

      .card h3 {
        padding: 10px;
        font-size: 13px;
        line-height: 1.2;
        text-align: left;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .card a {
        display: block;
        color: inherit;
        text-decoration: none;
      }

      /* scroll smooth */
      html {
        scroll-behavior: smooth;
      }
    </style>
  </head>
  <body>
    <!-- ===== HEADER ===== -->

    <div class="header">
      <div class="profile">
        <div class="avatar">
          <img src="your-avatar.jpg" />
        </div>
        <div class="info">
          <h1>Nguyễn Ngọc Tuấn</h1>
          <p>Bio của bạn đặt tại đây</p>
        </div>
      </div>
      <button class="contact-btn">Liên hệ</button>
    </div>

    <!-- ===== YOUTUBE ===== -->

    <div class="section">
      <h2>YouTube</h2>
      <div class="grid grid--fixed" id="youtubeContainer"></div>
    </div>

    <!-- ===== SOUNDCLOUD ===== -->

    <div class="section">
      <h2>SoundCloud</h2>
      <div class="grid grid--fixed" id="soundcloudContainer"></div>
    </div>

    <!-- ===== SPOTIFY ===== -->

    <div class="section">
      <h2>Spotify</h2>
      <div class="grid grid--spotify" id="spotifyContainer"></div>
    </div>

    <script>
      const youtubeVideos = [
        {
          title: "Video 1",
          url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
        },
        {
          title: "Video 2",
          url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
        },
        {
          title: "Video 3",
          url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
        },
        {
          title: "Video 4",
          url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
        },
        {
          title: "Video 5",
          url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
        },
        {
          title: "Video 6",
          url: "https://www.youtube.com/watch?v=dQw4w9WgXcQ",
        },
      ];

      const soundcloudTracks = [
        {
          title: "Track 1",
          thumbnail:
            "https://i1.sndcdn.com/artworks-000000000000-0-t500x500.jpg",
          url: "#",
        },
        {
          title: "Track 2",
          thumbnail:
            "https://i1.sndcdn.com/artworks-000000000000-0-t500x500.jpg",
          url: "#",
        },
        {
          title: "Track 3",
          thumbnail:
            "https://i1.sndcdn.com/artworks-000000000000-0-t500x500.jpg",
          url: "#",
        },
        {
          title: "Track 4",
          thumbnail:
            "https://i1.sndcdn.com/artworks-000000000000-0-t500x500.jpg",
          url: "#",
        },
        {
          title: "Track 5",
          thumbnail:
            "https://i1.sndcdn.com/artworks-000000000000-0-t500x500.jpg",
          url: "#",
        },
        {
          title: "Track 6",
          thumbnail:
            "https://i1.sndcdn.com/artworks-000000000000-0-t500x500.jpg",
          url: "#",
        },
      ];

      const spotifyTracks = [
        {
          title: "Spotify 1",
          thumbnail:
            "https://i.scdn.co/image/ab67616d0000b273ff9ca10b55ce82ae553c8228",
          url: "#",
        },
        {
          title: "Spotify 2",
          thumbnail:
            "https://i.scdn.co/image/ab67616d0000b273ff9ca10b55ce82ae553c8228",
          url: "#",
        },
        {
          title: "Spotify 3",
          thumbnail:
            "https://i.scdn.co/image/ab67616d0000b273ff9ca10b55ce82ae553c8228",
          url: "#",
        },
      ];

      function extractYouTubeID(url) {
        return url.split("v=")[1];
      }

      function createCard(container, title, img, link) {
        const card = document.createElement("div");
        card.classList.add("card");

        card.innerHTML = `
        <a href="${link}" target="_blank">
            <img src="${img}">
            <h3>${title}</h3>
        </a>
    `;

        container.appendChild(card);
      }

      function loadSection() {
        const ytContainer = document.getElementById("youtubeContainer");
        youtubeVideos.forEach((v) => {
          const id = extractYouTubeID(v.url);
          const thumb = `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;
          createCard(ytContainer, v.title, thumb, v.url);
        });

        const scContainer = document.getElementById("soundcloudContainer");
        soundcloudTracks.forEach((t) => {
          createCard(scContainer, t.title, t.thumbnail, t.url);
        });

        const spContainer = document.getElementById("spotifyContainer");
        spotifyTracks.forEach((t) => {
          createCard(spContainer, t.title, t.thumbnail, t.url);
        });
      }

      function revealOnScroll() {
        const cards = document.querySelectorAll(".card");
        cards.forEach((card) => {
          const top = card.getBoundingClientRect().top;
          if (top < window.innerHeight - 100) {
            card.classList.add("show");
          }
        });
      }

      window.addEventListener("scroll", revealOnScroll);

      loadSection();
      setTimeout(revealOnScroll, 200);
    </script>
  </body>
</html>
